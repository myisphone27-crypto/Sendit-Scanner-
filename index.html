<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sendit Scanner">
    <title>Sendit Scanner</title>
    
    <!-- Manifest Link -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (نفس كود CSS السابق بالضبط) ... */
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --accent: #ef4444; 
            --success: #10b981;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100%;
            position: fixed;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: var(--bg-card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }

        .header-title { font-size: 1.25rem; font-weight: 700; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            justify-content: flex-start;
            align-items: center;
            padding-top: 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding-bottom: 100px;
        }

        .scanner-container {
            width: 90%;
            height: 35vh;
            max-height: 300px;
            background: #000;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        #qr-reader { 
            width: 100%; 
            height: 100%; 
            border: none !important;
        }
        
        #qr-reader video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover; 
        }

        #qr-reader__dashboard { display: none !important; }
        
        #qr-reader__scan_region {
            background-color: transparent !important;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #qr-reader__scan_region img {
            display: block !important;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .scan-frame {
            width: 85%;
            height: 60%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        }
        
        .scan-frame::before, .scan-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            animation: pulse 2s infinite;
        }
        .scan-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; border-radius: 10px 0 0 0; }
        .scan-frame::after { bottom: -2px; right: -2px; border-left: none; border-top: none; border-radius: 0 0 10px 0; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .flash-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        
        .flash-btn.active { background: rgba(255, 255, 0, 0.9); color: #000; border-color: #ffdd00; }
        .flash-btn svg { width: 24px; height: 24px; }

        .gallery-container { margin-top: 25px; display: flex; justify-content: center; align-items: center; }

        .btn-gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px 30px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-gallery:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .btn-gallery svg { width: 32px; height: 32px; margin-bottom: 5px; }
        .btn-gallery span { font-size: 0.85rem; font-weight: 500; }

        .manual-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: var(--bg-card);
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex; gap: 12px; align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
        }

        .input-field {
            flex: 1;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
        }
        .input-field:focus { outline: none; border-color: var(--accent); }

        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }

        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--success); color: white;
            padding: 12px 24px; border-radius: 50px; font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 2000; opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: center; max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.redirect { background: #3b82f6; }
        .toast.error { background: #b91c1c; }

        .start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; transition: opacity 0.3s; border-radius: 20px;
        }
        .start-overlay.hidden { opacity: 0; pointer-events: none; }
        .start-overlay.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1 class="header-title">Sendit Scanner</h1>
    </header>

    <main class="main-content">
        <div class="scanner-container" id="scannerContainer">
            
            <div class="start-overlay active" id="startOverlay">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h.01M7 12h.01M7 17h.01M12 7h.01M12 12h.01M12 17h.01M17 7h.01M17 12h.01M17 17h.01"/></svg>
                <p style="margin-top: 15px; color: var(--text-muted);">Appuyez pour démarrer</p>
                <button class="btn btn-primary" style="margin-top: 15px;" id="initBtn">Démarrer Caméra</button>
            </div>

            <div id="qr-reader"></div>
            
            <div class="scan-overlay" id="scanOverlayVisual">
                <div class="scan-frame"></div>
            </div>

            <button id="flashBtn" class="flash-btn" title="Toggle Flash" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </button>
        </div>

        <div class="gallery-container">
            <button class="btn-gallery" id="galleryBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>Importer Image</span>
            </button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <div class="manual-bar">
            <input type="text" class="input-field" id="manualInput" placeholder="Entrer ID..." autocomplete="off">
            <button class="btn btn-primary" id="goBtn">OK</button>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }

        // --- Config & State ---
        const BASE_URL = "https://app.sendit.ma/deliveries/";
        let html5QrCode = null; 
        let isScanning = false;  
        let torchEnabled = false;
        let audioCtx = null;

        const $ = id => document.getElementById(id);

        // --- Sound System ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playBeep() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }

        function showToast(msg, type = 'success') {
            const t = $('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function processCode(code) {
            let url = "";
            if (code.startsWith("http://") || code.startsWith("https://")) {
                url = code;
            } else {
                url = BASE_URL + code;
            }
            window.open(url, '_blank');
            showToast("Ouverture...", "redirect");
        }

        async function stopScannerAndReset() {
            if (!html5QrCode) return;
            try {
                if (isScanning) await html5QrCode.stop();
            } catch (err) {
                console.warn("Stop Error:", err);
            }
            
            isScanning = false;
            torchEnabled = false;
            $('startOverlay').classList.remove('hidden');
            $('startOverlay').classList.add('active');
            $('flashBtn').style.display = 'none';
            $('flashBtn').classList.remove('active');
            $('scanOverlayVisual').style.display = 'flex';
        }

        async function onScanSuccess(decodedText, decodedResult) {
            if (navigator.vibrate) navigator.vibrate(100);
            playBeep();
            processCode(decodedText);
            await stopScannerAndReset();
        }

        // --- Camera Scanner Logic ---
        async function initScanner() {
            if (isScanning) return;

            try {
                initAudio();
                
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("qr-reader");
                }
                
                const config = {
                    fps: 10,
                    qrbox: function(w, h) {
                        return { width: w*0.9, height: h*0.5 };
                    },
                    aspectRatio: 1.0,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.QR_CODE,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.EAN_13
                    ]
                };

                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess, 
                    () => {}
                );

                isScanning = true;
                $('startOverlay').classList.add('hidden');
                $('startOverlay').classList.remove('active');
                $('flashBtn').style.display = "flex";
                $('scanOverlayVisual').style.display = 'flex';

            } catch (err) {
                console.error("Camera Error:", err);
                showToast("Erreur d'accès caméra", "error");
                $('startOverlay').classList.remove('hidden');
                $('startOverlay').classList.add('active');
            }
        }

        // --- File (Gallery) Scanner Logic ---
        async function handleFileSelection(event) {
            const file = event.target.files[0];
            if (!file) return;

            initAudio();
            $('scanOverlayVisual').style.display = 'none'; 
            showToast("Analyse de l'image...", "redirect");

            try {
                let tempElement = document.getElementById('temp-scan-div');
                if (!tempElement) {
                    tempElement = document.createElement('div');
                    tempElement.id = 'temp-scan-div';
                    tempElement.style.position = 'absolute';
                    tempElement.style.left = '-9999px';
                    tempElement.style.top = '0px';
                    document.body.appendChild(tempElement);
                }

                const fileScanner = new Html5Qrcode('temp-scan-div', {
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.QR_CODE,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.EAN_13
                    ],
                    verbose: false
                });

                const decodedText = await fileScanner.scanFile(file, true);
                
                if (navigator.vibrate) navigator.vibrate(100);
                playBeep();
                processCode(decodedText);
                
                await fileScanner.clear();
                await stopScannerAndReset();

            } catch (err) {
                console.error("File Scan Error:", err);
                showToast("Aucun code détecté", "error");
                $('scanOverlayVisual').style.display = 'flex';
            }

            event.target.value = '';
        }

        // --- Flash Logic ---
        async function toggleFlash() {
            if (!html5QrCode || !isScanning) return;
            try {
                const videoElement = document.querySelector("#qr-reader video");
                if (!videoElement || !videoElement.srcObject) return;
                
                const track = videoElement.srcObject.getVideoTracks()[0];
                if (!track) return;

                const capabilities = track.getCapabilities();
                if (!capabilities.torch) {
                    showToast('Flash non supporté', 'error');
                    return;
                }

                torchEnabled = !torchEnabled;
                await track.applyConstraints({ advanced: [{ torch: torchEnabled }] });
                
                if (torchEnabled) $('flashBtn').classList.add('active');
                else $('flashBtn').classList.remove('active');

            } catch (err) {
                console.error("Flash Error:", err);
            }
        }

        // --- Events ---
        $('initBtn').addEventListener('click', () => initScanner());
        $('flashBtn').addEventListener('click', toggleFlash);

        $('galleryBtn').addEventListener('click', () => $('fileInput').click());
        $('fileInput').addEventListener('change', handleFileSelection);

        $('goBtn').addEventListener('click', () => {
            const code = $('manualInput').value.trim();
            if (code) {
                playBeep();
                processCode(code);
                $('manualInput').value = '';
            }
        });

        $('manualInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') $('goBtn').click();
        });

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'hidden') {
                if (html5QrCode && isScanning) {
                    try { await html5QrCode.pause(); } catch(e) {}
                }
            } else {
                if (html5QrCode && isScanning) {
                     try { await html5QrCode.resume(); } catch(e) {}
                }
            }
        });

    </script>
</body>
</html>
